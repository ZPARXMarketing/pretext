<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cursor Walk — Pretext</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0b0c10;
    --ink-lit: rgba(224, 215, 196, 0.92);
    --ink-dim: rgba(224, 215, 196, 0.09);
    --amber: #e8a730;
    --amber-glow: rgba(232, 167, 48, 0.55);
    --amber-faint: rgba(232, 167, 48, 0.18);
    --muted: rgba(224, 215, 196, 0.32);
    --rule: rgba(232, 167, 48, 0.18);
    --serif: "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
    --mono: "SF Mono", ui-monospace, Menlo, "Cascadia Code", monospace;
  }
  html, body {
    min-height: 100%;
    background: var(--bg);
  }
  body {
    font-family: var(--serif);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    color: var(--ink-lit);
  }

  /* ── Top bar ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 24px;
    background: rgba(11, 12, 16, 0.88);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--rule);
  }
  .topbar-brand {
    font: 11px/1 var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber);
    flex: 0 0 auto;
  }
  .topbar-sep { flex: 1 1 auto; }
  .hud {
    font: 11px/1 var(--mono);
    color: var(--muted);
    white-space: nowrap;
    display: flex;
    gap: 16px;
  }
  .hud-item { display: flex; align-items: center; gap: 5px; }
  .hud-label { opacity: 0.6; }
  .hud-value { color: var(--amber); min-width: 3ch; text-align: right; }
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 0 0 auto;
  }
  .controls label {
    font: 10px/1 var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .controls input[type=range] {
    width: 72px;
    accent-color: var(--amber);
    cursor: pointer;
  }
  .btn {
    font: 10px/1 var(--mono);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--amber);
    background: transparent;
    border: 1px solid var(--amber-faint);
    border-radius: 3px;
    padding: 5px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 120ms, border-color 120ms;
  }
  .btn:hover { background: var(--amber-faint); border-color: var(--rule); }
  .btn:active { opacity: 0.7; }

  /* ── Text stage ── */
  .text-area {
    flex: 1 1 auto;
    padding: 56px 0 80px;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 100%;
  }

  /* ── Lines ── */
  .text-line {
    position: absolute;
    white-space: pre;
    font: 18px/30px var(--serif);
    user-select: text;
    -webkit-user-select: text;
  }
  .text-line .lit { color: var(--ink-lit); }
  .text-line .dim { color: var(--ink-dim); }

  /* ── Cursor ── */
  #cursor {
    position: absolute;
    width: 2px;
    height: 22px;
    margin-top: 4px;
    background: var(--amber);
    box-shadow: 0 0 10px 2px var(--amber-glow);
    border-radius: 1px;
    pointer-events: none;
    will-change: left, top;
    transition: opacity 400ms ease;
  }
  #cursor.blinking {
    animation: cursor-blink 1s ease-in-out infinite;
  }
  @keyframes cursor-blink {
    0%, 40%  { opacity: 1; }
    50%, 90% { opacity: 0.1; }
    100%     { opacity: 1; }
  }

  /* ── Footer ── */
  .footer {
    padding: 14px 24px;
    border-top: 1px solid var(--rule);
    font: 10px/1.6 var(--mono);
    letter-spacing: 0.06em;
    color: var(--muted);
    text-align: center;
  }
  .footer a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .topbar { padding: 9px 14px; gap: 10px; }
    .hud { display: none; }
    .controls input[type=range] { width: 56px; }
    .text-area { padding: 40px 0 60px; }
  }
  @media (max-width: 420px) {
    .controls label { display: none; }
  }
</style>
</head>
<body>

<header class="topbar">
  <span class="topbar-brand">Pretext · Cursor Walk</span>
  <div class="hud">
    <span class="hud-item">
      <span class="hud-label">LINE</span>
      <span class="hud-value" id="info-line">—</span>
    </span>
    <span class="hud-item">
      <span class="hud-label">CHAR</span>
      <span class="hud-value" id="info-char">—</span>
    </span>
  </div>
  <div class="topbar-sep"></div>
  <div class="controls">
    <label for="speed-slider">Speed</label>
    <input type="range" id="speed-slider" min="1" max="10" value="7">
    <button class="btn" id="pause-btn">Pause</button>
    <button class="btn" id="restart-btn">Restart</button>
  </div>
</header>

<main class="text-area">
  <div id="stage">
    <div id="cursor"></div>
  </div>
</main>

<footer class="footer">
  Line breaks via <strong>Pretext</strong> · Character positions via canvas <code>measureText</code> · Zero DOM reads in the layout path
</footer>

<script type="module" src="./cursor-walk.ts"></script>
</body>
</html>
